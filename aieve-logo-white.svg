  <rect x="13"   y="22.5" width="3" height="15"  rx="1.5" fill="rgba(255,245,235,0.55)"/>
  <rect x="18.5" y="17.5" width="3" height="25"  rx="1.5" fill="rgba(255,245,235,0.75)"/>
  <rect x="24"   y="13.5" width="3" height="33"  rx="1.5" fill="rgba(255,255,255,0.9)"/>
