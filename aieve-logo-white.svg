  <rect x="35"   y="13.5" width="3" height="33"  rx="1.5" fill="rgba(255,255,255,0.9)"/>
  <rect x="40.5" y="17.5" width="3" height="25"  rx="1.5" fill="rgba(255,245,235,0.75)"/>
